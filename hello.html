<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevBoard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,sans-serif}
body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#4c1d95,#6d28d9,#9333ea);
    color:#fff;
}
.card{
    text-align:center;
    padding:40px;
    max-width:500px;
}
h1{
    font-size:3rem;
    margin-bottom:12px;
}
p{
    font-size:1.1rem;
    color:#e9d5ff;
    margin-bottom:30px;
    line-height:1.6;
}
button{
    padding:14px 32px;
    border:none;
    border-radius:12px;
    background:#fff;
    color:#5b21b6;
    font-size:1rem;
    font-weight:600;
    cursor:pointer;
    transition:.2s;
}
button:hover{
    transform:translateY(-2px);
}
</style>
</head>
<body>

<div class="card">
    <h1>DevBoard</h1>
    <p>Stay focused. Track developer tasks, organize projects, and ship faster with a clean workspace.</p>
    <button>Get Started</button>
</div>

</body>
</html>
